<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace Soft Synth</title>
    <meta name="description" content="Solace Soft Synth — polyphonic subtractive synthesizer plugin">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Status indicator -->
<div class="status-indicator" id="status-indicator" aria-live="polite">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">connecting...</span>
</div>

<!-- ============================================================
     Root Layout
     ============================================================ -->
<div class="solace-root" id="solace-root">

    <!-- ==================== TOP BAR ==================== -->
    <header class="top-bar" role="banner">

        <div class="logo-group">
            <img
                class="logo-monogram"
                src="assets/icons/logo.svg"
                alt="Solace Synth logo"
                id="logo-img"
                onerror="this.style.display='none'"
            >
            <span class="logo-title">Solace Soft Synth</span>
        </div>

        <div class="top-controls">
            <div class="preset-selector" role="group" aria-label="Preset selector">
                <button class="preset-nav-btn" id="btn-preset-prev" aria-label="Previous preset">
                    <img src="assets/icons/btn-left.svg" alt="" aria-hidden="true">
                </button>
                <div class="preset-dropdown" id="preset-dropdown" role="button" tabindex="0" aria-label="Current preset">
                    <span class="preset-dropdown-label" id="preset-name">Initial Preset</span>
                </div>
                <button class="preset-nav-btn" id="btn-preset-next" aria-label="Next preset">
                    <img src="assets/icons/btn-right.svg" alt="" aria-hidden="true">
                </button>
            </div>

            <button class="menu-btn" id="btn-menu" aria-label="Menu">
                <img src="assets/icons/btn-menu.svg" alt="" aria-hidden="true">
            </button>
        </div>

    </header>

    <!-- ==================== CONTENT AREA ==================== -->
    <main class="content-area" id="content-area">

        <!-- ---- ROW 1: Oscillators + Amp Envelope + Master ---- -->
        <div class="section-row" id="row-top">

            <!-- Osc block: Osc1 | divider | OscMix | divider | Osc2 -->
            <section class="card card--osc-block" id="card-osc" aria-label="Oscillators">
                <div class="card-row">

                    <!-- Oscillator 1 -->
                    <div class="sub-section sub-section--osc1" id="section-osc1">
                        <h2 class="section-heading">Oscillator 1</h2>
                        <div class="controls-row controls-row--osc" id="osc1-controls">
                            <!-- Components mount here -->
                            <div id="mount-osc1Waveform"></div>
                            <div id="mount-osc1Octave"></div>
                            <div id="mount-osc1Transpose"></div>
                            <div id="mount-osc1Tuning"></div>
                        </div>
                    </div>

                    <div class="card-divider" role="separator"></div>

                    <!-- Osc Mix -->
                    <div class="sub-section sub-section--osc-mix" id="section-osc-mix">
                        <h2 class="section-heading">Osc Mix</h2>
                        <div class="controls-row controls-row--center" id="osc-mix-controls">
                            <div id="mount-oscMix"></div>
                        </div>
                    </div>

                    <div class="card-divider" role="separator"></div>

                    <!-- Oscillator 2 -->
                    <div class="sub-section sub-section--osc2" id="section-osc2">
                        <h2 class="section-heading">Oscillator 2</h2>
                        <div class="controls-row controls-row--osc" id="osc2-controls">
                            <!-- Components mount here -->
                            <div id="mount-osc2Waveform"></div>
                            <div id="mount-osc2Octave"></div>
                            <div id="mount-osc2Transpose"></div>
                            <div id="mount-osc2Tuning"></div>
                        </div>
                    </div>

                </div>
            </section>

            <!-- Amplifier Envelope -->
            <section class="card card--amp-env" id="card-amp-env" aria-label="Amplifier Envelope">
                <h2 class="section-heading">Amplifier Envelope</h2>
                <div class="controls-row" id="amp-env-controls">
                    <div id="mount-ampAttack"></div>
                    <div id="mount-ampDecay"></div>
                    <div id="mount-ampSustain"></div>
                    <div id="mount-ampRelease"></div>
                </div>
            </section>

            <!-- Master -->
            <section class="card card--master" id="card-master" aria-label="Master">
                <h2 class="section-heading">Master</h2>
                <div class="controls-row" id="master-controls">
                    <div id="mount-masterDistortion"></div>
                    <div id="mount-masterVolume"></div>
                </div>
            </section>

        </div><!-- /row-top -->

        <!-- ---- ROW 2: Filter + LFO + Voicing ---- -->
        <div class="section-row" id="row-bottom">

            <!-- Filter block: Filter | divider | Filter Config -->
            <section class="card card--filter-block" id="card-filter" aria-label="Filter and Filter Configuration">
                <div class="card-row">

                    <!-- Filter -->
                    <div class="sub-section sub-section--filter" id="section-filter">
                        <h2 class="section-heading">Filter</h2>
                        <div class="controls-row" id="filter-controls">
                            <div id="mount-filterCutoff"></div>
                            <div id="mount-filterResonance"></div>
                        </div>
                    </div>

                    <div class="card-divider" role="separator"></div>

                    <!-- Filter Configuration: type selector + ADSR env faders in a row -->
                    <div class="sub-section sub-section--filter-cfg" id="section-filter-config">
                        <h2 class="section-heading">Filter Configuration</h2>

                        <!-- Column: type row on top, env faders below -->
                        <div class="controls-row--col" id="filter-cfg-inner">

                            <!-- Filter Type  +  filterEnvDepth (hidden — not in Figma design) -->
                            <div class="controls-row" id="filter-type-row">
                                <div id="mount-filterType"></div>
                                <!-- filterEnvDepth HIDDEN: not in Figma design (confirmed 2026-03-09).
                                     Component still mounts + bridge listener registered.
                                     Unhide only when Nabeel adds it to the design. -->
                                <div id="mount-filterEnvDepth" hidden></div>
                            </div>

                            <!-- Filter Envelope ADSR — horizontal row of small faders -->
                            <div class="filter-cfg-env-row" id="filter-env-controls">
                                <div id="mount-filterEnvAttack"></div>
                                <div id="mount-filterEnvDecay"></div>
                                <div id="mount-filterEnvSustain"></div>
                                <div id="mount-filterEnvRelease"></div>
                            </div>

                        </div>
                    </div>

                </div>
            </section>

            <!-- Low Frequency Oscillator -->
            <section class="card card--lfo" id="card-lfo" aria-label="Low Frequency Oscillator">
                <h2 class="section-heading">Low Frequency Osc</h2>

                <div class="controls-row" id="lfo-controls">

                    <!-- Left column: waveform selector + target dropdowns -->
                    <div class="lfo-left-col">
                        <div id="mount-lfoWaveform"></div>

                        <div class="dropdown-group">
                            <span class="dropdown-group-label">LFO Targets</span>
                            <div id="mount-lfoTarget1"></div>
                            <div id="mount-lfoTarget2"></div>
                            <div id="mount-lfoTarget3"></div>
                        </div>
                    </div>

                    <!-- Right: Amount + Rate faders -->
                    <div class="lfo-faders">
                        <div id="mount-lfoAmount"></div>
                        <div id="mount-lfoRate"></div>
                    </div>

                </div>
            </section>

            <!-- Voicing -->
            <section class="card card--voicing" id="card-voicing" aria-label="Voicing">
                <h2 class="section-heading">Voicing</h2>

                <div class="voicing-inner">

                    <!-- Left: voice/unison selectors + vel mod dropdowns -->
                    <div class="voicing-selectors">
                        <div id="mount-voiceCount"></div>
                        <div id="mount-unisonCount"></div>

                        <div class="dropdown-group">
                            <span class="dropdown-group-label">Velocity Mod Targets</span>
                            <div id="mount-velocityModTarget1"></div>
                            <div id="mount-velocityModTarget2"></div>
                        </div>
                    </div>

                    <!-- Right: velocity range fader -->
                    <div id="mount-velocityRange"></div>

                </div>
            </section>

        </div><!-- /row-bottom -->

    </main>

</div><!-- /solace-root -->

<!-- Debug Panel (Ctrl+Shift+D) -->
<div class="debug-panel" id="debug-panel" role="log" aria-label="Debug log" aria-live="off">
    <div class="debug-panel-title">BRIDGE DEBUG LOG — Ctrl+Shift+D to close</div>
    <div class="debug-log" id="debug-log"></div>
</div>

<script src="bridge.js"></script>
<script src="components/fader.js"></script>
<script src="components/arrow-selector.js"></script>
<script src="components/waveform-selector.js"></script>
<script src="components/dropdown.js"></script>
<script src="main.js"></script>

</body>
</html>
